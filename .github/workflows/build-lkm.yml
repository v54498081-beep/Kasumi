name: Build LKM for Kasumi

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/**
      - dev

jobs:
  build-lkm:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
        kmi:
          - android13-5.15
    uses: ./.github/workflows/ddk-lkm.yml
    secrets: inherit
    with:
      arch: ${{ matrix.arch }}
      kmi: ${{ matrix.kmi }}
      ddk_release: "20240429"

  merge-lkm:
    name: Merge all LKM artifacts
    needs: build-lkm
    runs-on: ubuntu-latest
    steps:
      - name: Download all LKM artifacts
        uses: actions/download-artifact@v5

      - name: Merge into lkm folder
        run: |
          mkdir -p lkm
          find . -name "*.ko" -path "*kasumi_lkm*" -exec cp {} lkm/ \;
          ls -la lkm/

      - name: Import GPG key
        if: github.actor == 'Anatdx'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          gpg --batch --import <<< "$GPG_PRIVATE_KEY"
          gpg --list-secret-keys --keyid-format long

      - name: Sign all LKM .ko files with GPG
        if: github.actor == 'Anatdx'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for ko in lkm/*.ko; do
            [ -f "$ko" ] || continue
            name=$(basename "$ko")
            echo "Signing $name..."
            gpg --detach-sign --local-user 0x942F2C75D1DC540F --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --output "lkm/${name}.asc" "$ko"
          done
          ls -la lkm/*.asc 2>/dev/null || echo "No .ko.asc files"

      - name: Upload combined LKM artifact
        uses: actions/upload-artifact@v6
        with:
          name: kasumi-lkm-all
          path: lkm/

      - name: Create zip archive
        run: |
          zip -r kasumi-lkm.zip lkm/
          ls -la kasumi-lkm.zip

      - name: Sign zip with GPG
        if: github.actor == 'Anatdx'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "Signing kasumi-lkm.zip..."
          gpg --detach-sign --local-user 0x942F2C75D1DC540F --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --output "kasumi-lkm.zip.asc" "kasumi-lkm.zip"
          ls -la kasumi-lkm.zip.asc

      - name: Prepare and upload zip artifact
        run: |
          mkdir -p dist
          cp kasumi-lkm.zip dist/
          [ -f kasumi-lkm.zip.asc ] && cp kasumi-lkm.zip.asc dist/ || true

      - name: Upload zip artifact
        uses: actions/upload-artifact@v6
        with:
          name: kasumi-lkm-zip
          path: dist/

  post-lkm-tg:
    name: Post LKM zip to Telegram
    needs: merge-lkm
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (for scripts)
        uses: actions/checkout@v5
        with:
          sparse-checkout: scripts

      - name: Download LKM zip
        uses: actions/download-artifact@v5
        with:
          name: kasumi-lkm-zip
          path: dist

      - name: Post zip to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.KPM_MESSAGE_THREAD_ID }}
          SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: "Kasumi LKM (all KMI)"
          VERSION: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "BOT_TOKEN/CHAT_ID not set, skipping."
            exit 0
          fi
          pip install telethon==1.34.0
          ZIP="dist/kasumi-lkm.zip"
          FILES="$ZIP"
          [ -f "dist/kasumi-lkm.zip.asc" ] && FILES="$FILES dist/kasumi-lkm.zip.asc"
          if [ -f "$ZIP" ]; then
            python3 scripts/kasumibot.py $FILES
          else
            echo "No zip to upload"
          fi
